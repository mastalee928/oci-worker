services:
  mysql:
    image: mysql:8.0
    container_name: oci-worker-mysql
    restart: always
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=oci_worker
      - MYSQL_USER=ociworker
      - MYSQL_PASSWORD=ociworker123
      - TZ=Asia/Shanghai
    volumes:
      - ./data/mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
