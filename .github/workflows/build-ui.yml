# 从 feature/ui-polish 构建前端 + 后端 JAR，发布到 GitHub Release `ui-latest`
#（供 install.sh + OCI_WORKER_UI=1 与主站相同的「一条命令直装」动效/Orbis UI 版）

name: Build UI JAR (ui-latest)

on:
  push:
    branches: [feature/ui-polish]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Embed build info
        run: |
          echo "${{ github.sha }}" > backend/src/main/resources/build-commit.txt

      - name: Build Backend JAR
        working-directory: backend
        run: mvn clean package -DskipTests -q

      - name: Publish JAR to ui-latest (upload / clobber — no 404 window)
        run: |
          set -euo pipefail
          JAR="backend/target/oci-worker-1.0.0.jar"
          NOTES="与 \`install.sh\` 配合使用：\`OCI_WORKER_UI=1\` 时从本 Release 拉取 JAR。构建提交：${{ github.sha }}。"
          if gh release view ui-latest >/dev/null 2>&1; then
            gh release upload ui-latest "${JAR}" --clobber
            gh release edit ui-latest --notes "${NOTES}"
          else
            gh release create ui-latest \
              --title "UI / Orbis (feature/ui-polish)" \
              --notes "${NOTES}" \
              --latest false \
              "${JAR}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
