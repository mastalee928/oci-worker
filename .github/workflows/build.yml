name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Embed build info
        run: |
          echo "${{ github.sha }}" > backend/src/main/resources/build-commit.txt

      - name: Build Backend JAR
        working-directory: backend
        run: mvn clean package -DskipTests -q

      # 禁止先 delete 再 create：中间会有数秒～数十秒无 JAR，用户 curl 必 404。
      - name: Publish JAR to latest release (upload / clobber — no 404 window)
        run: |
          set -euo pipefail
          JAR="backend/target/oci-worker-1.0.0.jar"
          NOTES="Auto-built from commit ${{ github.sha }}"
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest "${JAR}" --clobber
            gh release edit latest --notes "${NOTES}"
          else
            gh release create latest \
              --title "Latest Build" \
              --notes "${NOTES}" \
              --latest \
              "${JAR}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
