server:
  port: 8818

# New API / OpenAI 兼容 HTTP：独立端口，与面板(8818)、本机 WebSSH(8008) 分离；Base URL 示例 http://<本机或反代地址>:<openaiApi.port>/v1
ociworker:
  openaiApi:
    # 0 = 不启用第二端口；>0 且与 server.port 不同时，Tomcat 额外监听该口供 /v1 等 OpenAI 路由
    port: 8080
  telegram:
    # Telegram Webhook 路径密钥：https://你的域名/api/tg/callback/{webhook-secret}
    # 须与 setWebhook 的 url 路径末尾一致；留空则回调接口返回 404（TG 内联按钮需配置后才可用）
    webhook-secret: ${TG_WEBHOOK_SECRET:}
    # Telegram setWebhook 的 secret_token（仅允许 A-Za-z0-9_-，见官方文档）；Webhook 请求须带请求头 X-Telegram-Bot-Api-Secret-Token 且与此完全一致。
    # 留空则不校验该头（兼容旧 Webhook）。建议与路径密钥分开配置，并在 setWebhook 时同时传入 url 与 secret_token。
    webhook-secret-token: ${TG_WEBHOOK_SECRET_TOKEN:}

web:
  account: admin
  password: admin123

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oci_worker?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ociworker
    password: ociworker123
    hikari:
      # 连接在池里的最长存活（须小于 MySQL 的 wait_timeout，并留 1 分钟以上余量）
      max-lifetime: 1500000
      # 定期对空闲连接发保活，减少「服务端已关、池里还以为能用」
      keepalive-time: 120000
  sql:
    init:
      mode: never
  ai:
    openai:
      api-key: sk-xxx
      base-url: https://api.siliconflow.cn
      chat:
        options:
          model: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B

mybatis-plus:
  mapper-locations: classpath*:com/ociworker/mapper/xml/*.xml,classpath*:mapper/*.xml

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %msg%n"
  level:
    com.oracle.bmc: error
    c.o.b.h.c.j: error

oci-cfg:
  key-dir-path: ./keys
