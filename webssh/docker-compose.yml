services:
  webssh:
    build: .
    container_name: webssh
    restart: unless-stopped
    ports:
      - "${PORT:-8008}:${PORT:-8008}"
    environment:
      - port=${PORT:-8008}
      - savePass=${SAVE_PASS:-true}
      - showFooter=${SHOW_FOOTER:-true}
      # Uncomment to enable basic auth for the web UI:
      # - authInfo=admin:your_password
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${PORT:-8008}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
