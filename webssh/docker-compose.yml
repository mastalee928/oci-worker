services:
  webssh:
    build: .
    container_name: webssh
    restart: unless-stopped
    network_mode: host
    environment:
      - port=${PORT:-8008}
      - savePass=${SAVE_PASS:-true}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${PORT:-8008}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
